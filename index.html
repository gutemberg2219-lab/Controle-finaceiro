<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>FinançaZen | Controle Financeiro Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            padding: 12px;
            font-family: -apple-system, 'Segoe UI', 'Roboto', system-ui, sans-serif;
        }

        .dashboard {
            max-width: 100%;
            margin: 0 auto;
        }

        /* Header Mobile */
        .header-premium {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            padding: 15px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo-icon {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            width: 44px;
            height: 44px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .logo-area h1 {
            font-size: 1.4rem;
            background: linear-gradient(135deg, #fff, #a8e6ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .saldo-principal {
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 40px;
            text-align: center;
        }

        .saldo-principal span {
            font-size: 0.75rem;
            color: #b8e1fc;
        }

        .saldo-principal .valor-grande {
            font-size: 1.3rem;
            font-weight: 800;
            color: #fff;
            margin-left: 8px;
        }

        /* Grid Cards Mobile - Scroll Horizontal */
        .grid-cards {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding-bottom: 8px;
            margin-bottom: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .card-metric {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 15px;
            min-width: 150px;
            scroll-snap-align: start;
            position: relative;
            overflow: hidden;
        }

        .card-metric::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
        }

        .card-metric.renda-fixa::before { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .card-metric.receita::before { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .card-metric.despesa::before { background: linear-gradient(135deg, #eb3349, #f45c43); }
        .card-metric.cartao::before { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
        .card-metric.saldo::before { background: linear-gradient(135deg, #4facfe, #00f2fe); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .card-header h3 {
            font-size: 0.7rem;
            font-weight: 600;
            color: #2c3e50;
        }

        .valor-metric {
            font-size: 1.3rem;
            font-weight: 800;
        }

        /* Abas Mobile */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            padding: 10px 16px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            text-align: center;
            min-width: 80px;
        }

        .tab-btn.active {
            background: #2c8fbf;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Despesas Fixas Mobile */
        .despesas-fixas-section {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .despesa-fixa-item {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .despesa-fixa-item.pago {
            background: #d4edda;
            border-left: 4px solid #28a745;
        }

        .despesa-fixa-item.nao-pago {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
        }

        .despesa-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .despesa-nome {
            font-weight: 700;
            font-size: 1rem;
        }

        .despesa-valor {
            font-size: 1.1rem;
            font-weight: 800;
            color: #e74c3c;
        }

        .despesa-categoria {
            font-size: 0.7rem;
            color: #7f8c8d;
        }

        .despesa-acoes {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-pagar {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            flex: 1;
        }

        .btn-editar-fixa, .btn-excluir-fixa {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .btn-excluir-fixa {
            background: #dc3545;
        }

        .total-despesas-fixas {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            margin-top: 16px;
        }

        /* Formulários Mobile */
        .form-card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .form-flex {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-modern {
            width: 100%;
        }

        .input-modern label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #3d6b80;
            margin-bottom: 4px;
        }

        .input-modern input, .input-modern select {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: 1.5px solid #e0ecf3;
            font-size: 0.9rem;
            background: white;
        }

        .btn-primary {
            background: linear-gradient(95deg, #1e6f9f, #2c8fbf);
            border: none;
            padding: 12px 20px;
            border-radius: 35px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
            width: 100%;
        }

        /* Busca Mobile */
        .busca-container {
            background: rgba(0,0,0,0.05);
            padding: 12px;
            border-radius: 50px;
            margin-bottom: 16px;
        }

        .busca-container input {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #ddd;
            font-size: 0.9rem;
        }

        /* Tabela Mobile */
        .table-container {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 24px;
            overflow-x: auto;
        }

        .finance-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }

        .finance-table th {
            background: #eef3fc;
            padding: 12px 8px;
            text-align: left;
            font-weight: 700;
            color: #1f617c;
        }

        .finance-table td {
            padding: 10px 8px;
            border-bottom: 1px solid #ecf3f8;
        }

        .badge-type {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 700;
        }

        .badge-fixa { background: #ffeaa7; color: #d63031; }
        .badge-success { background: #dcfce7; color: #15803d; }
        .badge-danger { background: #ffe4e0; color: #b91c1c; }
        .badge-warning { background: #fff3cd; color: #856404; }

        .btn-delete {
            background: #fee2dd;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            color: #bc4a2c;
            font-size: 0.7rem;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            color: #bcd3df;
            font-size: 0.65rem;
            padding: 10px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }
    </style>
</head>
<body>
<div class="dashboard" id="app">
    <div class="loading" id="loading">Carregando...</div>
    
    <div id="conteudo-principal" style="display: none;">
        <div class="header-premium">
            <div class="logo-area">
                <div class="logo-icon">💳</div>
                <h1>FinançaZen</h1>
            </div>
            <div class="saldo-principal">
                <span>💰 SALDO DISPONÍVEL</span>
                <span class="valor-grande" id="saldoDisponivel">R$ 0,00</span>
            </div>
        </div>

        <div class="grid-cards" id="cardsContainer"></div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="fixas">📅 Fixas</button>
            <button class="tab-btn" data-tab="variaveis">💰 Renda</button>
            <button class="tab-btn" data-tab="cartao">💳 Cartão</button>
            <button class="tab-btn" data-tab="extrato">📋 Extrato</button>
        </div>

        <!-- Aba Despesas Fixas -->
        <div id="tab-fixas" class="tab-content active">
            <div class="despesas-fixas-section">
                <h3 style="margin-bottom: 12px; color: #2c3e50;">📅 Minhas Contas Mensais</h3>
                <div id="listaDespesasFixas"></div>
                <div class="total-despesas-fixas">
                    <strong>💰 Total Fixas: </strong>
                    <span id="totalFixasMes" style="font-size: 1.2rem; font-weight: 800;">R$ 0,00</span>
                </div>
            </div>

            <div class="form-card">
                <h3 style="margin-bottom: 12px; font-size: 1rem;">➕ Nova Despesa Fixa</h3>
                <div class="form-flex">
                    <div class="input-modern">
                        <label>Nome</label>
                        <input type="text" id="nomeDespesaFixa" placeholder="Ex: Água, Luz, Aluguel">
                    </div>
                    <div class="input-modern">
                        <label>Valor (R$)</label>
                        <input type="number" id="valorDespesaFixa" step="0.01" placeholder="0,00">
                    </div>
                    <div class="input-modern">
                        <label>Categoria</label>
                        <select id="categoriaDespesaFixa">
                            <option value="Moradia">🏠 Moradia</option>
                            <option value="Utilidades">💡 Utilidades</option>
                            <option value="Serviços">🔧 Serviços</option>
                            <option value="Assinaturas">📺 Assinaturas</option>
                        </select>
                    </div>
                    <button id="btnAddDespesaFixa" class="btn-primary">➕ Adicionar</button>
                </div>
            </div>
        </div>

        <!-- Aba Renda e Variáveis -->
        <div id="tab-variaveis" class="tab-content">
            <div class="form-card">
                <div class="form-flex">
                    <div class="input-modern">
                        <label>💰 Renda Fixa Mensal</label>
                        <input type="number" id="rendaFixaInput" step="100" placeholder="R$ 0,00">
                    </div>
                    <button id="btnSalvarRendaFixa" class="btn-primary">Salvar Renda</button>
                </div>
            </div>

            <div class="form-card">
                <h3 style="margin-bottom: 12px; font-size: 1rem;">➕ Nova Transação</h3>
                <div class="form-flex">
                    <div class="input-modern">
                        <label>Descrição</label>
                        <input type="text" id="descVariavel" placeholder="Ex: Ifood, Freela">
                    </div>
                    <div class="input-modern">
                        <label>Valor (R$)</label>
                        <input type="number" id="valorVariavel" step="0.01">
                    </div>
                    <div class="input-modern">
                        <label>Tipo</label>
                        <select id="tipoVariavel">
                            <option value="renda-extra">✨ Renda Extra</option>
                            <option value="despesa-variavel">💸 Despesa</option>
                        </select>
                    </div>
                    <div class="input-modern">
                        <label>Categoria</label>
                        <select id="categoriaVariavel">
                            <option value="Alimentação">🍔 Alimentação</option>
                            <option value="Transporte">🚗 Transporte</option>
                            <option value="Lazer">🎬 Lazer</option>
                        </select>
                    </div>
                    <div class="input-modern">
                        <label>Data</label>
                        <input type="date" id="dataVariavel">
                    </div>
                    <button id="btnAddVariavel" class="btn-primary">➕ Adicionar</button>
                </div>
            </div>
        </div>

        <!-- Aba Cartão -->
        <div id="tab-cartao" class="tab-content">
            <div class="form-card">
                <div style="margin-bottom: 12px;">
                    <strong>💳 Fatura: </strong>
                    <span style="font-size: 1.2rem; font-weight: 800; color: #e74c3c;" id="faturaAtual">R$ 0,00</span>
                </div>
                <div class="form-flex">
                    <div class="input-modern">
                        <label>💎 Limite do Cartão</label>
                        <input type="number" id="limiteCartao" step="100">
                    </div>
                    <button id="btnSalvarLimite" class="btn-primary">Definir</button>
                </div>
            </div>

            <div class="form-card">
                <h3 style="margin-bottom: 12px; font-size: 1rem;">➕ Nova Compra</h3>
                <div class="form-flex">
                    <div class="input-modern">
                        <label>Descrição</label>
                        <input type="text" id="descCartao" placeholder="Ex: Amazon">
                    </div>
                    <div class="input-modern">
                        <label>Valor (R$)</label>
                        <input type="number" id="valorCartao" step="0.01">
                    </div>
                    <div class="input-modern">
                        <label>Parcelas</label>
                        <select id="parcelasCartao">
                            <option value="1">À vista</option>
                            <option value="2">2x</option>
                            <option value="3">3x</option>
                            <option value="4">4x</option>
                            <option value="5">5x</option>
                            <option value="6">6x</option>
                        </select>
                    </div>
                    <div class="input-modern">
                        <label>Categoria</label>
                        <select id="categoriaCartao">
                            <option value="Compras">🛍️ Compras</option>
                            <option value="Lazer">🎬 Lazer</option>
                        </select>
                    </div>
                    <div class="input-modern">
                        <label>Data</label>
                        <input type="date" id="dataCartao">
                    </div>
                    <button id="btnAddCartao" class="btn-primary">➕ Adicionar</button>
                </div>
            </div>
        </div>

        <!-- Aba Extrato -->
        <div id="tab-extrato" class="tab-content">
            <div class="busca-container">
                <input type="text" id="buscaExtrato" placeholder="🔍 Buscar transação...">
            </div>
            <div class="table-container">
                <table class="finance-table">
                    <thead><tr><th>Data</th><th>Descrição</th><th>Valor</th><th>Ações</th></tr></thead>
                    <tbody id="extratoBody"></tbody>
                </table>
            </div>
            <div style="margin-top: 12px; display: flex; gap: 8px;">
                <button id="btnResetar" class="btn-primary" style="background: #95a5a6;">🔄 Resetar Demo</button>
            </div>
        </div>
        <footer>✅ Dados salvos no celular | Deslize os cards para ver tudo</footer>
    </div>
</div>

<script>
    // Dados principais
    let rendaFixa = 3000;
    let limiteCartao = 5000;
    let despesasFixas = [];
    let transacoesAvulsas = [];
    let comprasCartao = [];
    let mesAtual = new Date().getMonth();
    let anoAtual = new Date().getFullYear();

    function loadData() {
        try {
            const savedRenda = localStorage.getItem("renda_fixa");
            if(savedRenda) rendaFixa = parseFloat(savedRenda);
            
            const savedLimite = localStorage.getItem("limite_cartao");
            if(savedLimite) limiteCartao = parseFloat(savedLimite);
            
            const savedFixas = localStorage.getItem("despesas_fixas");
            if(savedFixas) despesasFixas = JSON.parse(savedFixas);
            
            const savedAvulsas = localStorage.getItem("transacoes_avulsas");
            if(savedAvulsas) transacoesAvulsas = JSON.parse(savedAvulsas);
            
            const savedCompras = localStorage.getItem("compras_cartao");
            if(savedCompras) comprasCartao = JSON.parse(savedCompras);
            
            if(despesasFixas.length === 0) {
                despesasFixas = [
                    { id: Date.now()+1, nome: "Água", valor: 85.00, categoria: "Utilidades", paga: false, mesReferencia: mesAtual, anoReferencia: anoAtual },
                    { id: Date.now()+2, nome: "Luz", valor: 120.00, categoria: "Utilidades", paga: false, mesReferencia: mesAtual, anoReferencia: anoAtual },
                    { id: Date.now()+3, nome: "Aluguel", valor: 1350.00, categoria: "Moradia", paga: false, mesReferencia: mesAtual, anoReferencia: anoAtual },
                    { id: Date.now()+4, nome: "Internet", valor: 99.90, categoria: "Serviços", paga: false, mesReferencia: mesAtual, anoReferencia: anoAtual }
                ];
                saveData();
            }
            
            document.getElementById("rendaFixaInput").value = rendaFixa;
            document.getElementById("limiteCartao").value = limiteCartao;
            
            const hoje = new Date().toISOString().slice(0,10);
            if(!document.getElementById("dataVariavel").value) document.getElementById("dataVariavel").value = hoje;
            if(!document.getElementById("dataCartao").value) document.getElementById("dataCartao").value = hoje;
            
            verificarNovoMes();
            atualizarParcelasCartao();
            renderizarCards();
            renderizarDespesasFixas();
            renderizarExtrato();
            
            document.getElementById("loading").style.display = "none";
            document.getElementById("conteudo-principal").style.display = "block";
        } catch(e) {
            console.error("Erro ao carregar:", e);
            document.getElementById("loading").innerHTML = "Erro ao carregar. Recarregue a página.";
        }
    }

    function verificarNovoMes() {
        const mesHoje = new Date().getMonth();
        const anoHoje = new Date().getFullYear();
        if(mesHoje !== mesAtual || anoHoje !== anoAtual) {
            despesasFixas.forEach(d => {
                d.paga = false;
                d.mesReferencia = mesHoje;
                d.anoReferencia = anoHoje;
            });
            mesAtual = mesHoje;
            anoAtual = anoHoje;
            saveData();
        }
    }

    function saveData() {
        localStorage.setItem("renda_fixa", rendaFixa);
        localStorage.setItem("limite_cartao", limiteCartao);
        localStorage.setItem("despesas_fixas", JSON.stringify(despesasFixas));
        localStorage.setItem("transacoes_avulsas", JSON.stringify(transacoesAvulsas));
        localStorage.setItem("compras_cartao", JSON.stringify(comprasCartao));
    }

    function calcularTotais() {
        let rendaExtraTotal = 0, despesasVariaveisTotal = 0, faturaCartaoTotal = 0, despesasFixasTotal = 0;
        
        transacoesAvulsas.forEach(t => {
            if(t.tipo === "renda-extra") rendaExtraTotal += t.valor;
            if(t.tipo === "despesa-variavel") despesasVariaveisTotal += t.valor;
            if(t.tipo === "cartao") faturaCartaoTotal += t.valor;
        });
        
        despesasFixas.forEach(d => despesasFixasTotal += d.valor);
        
        const rendaTotal = rendaFixa + rendaExtraTotal;
        const saldoLiquido = rendaTotal - (despesasFixasTotal + despesasVariaveisTotal + faturaCartaoTotal);
        
        return { rendaExtraTotal, despesasVariaveisTotal, faturaCartaoTotal, despesasFixasTotal, saldoLiquido };
    }

    function renderizarCards() {
        const totais = calcularTotais();
        const cards = [
            { classe: "renda-fixa", titulo: "🏠 RENDA FIXA", valor: `R$ ${rendaFixa.toFixed(2)}` },
            { classe: "receita", titulo: "✨ RENDA EXTRA", valor: `R$ ${totais.rendaExtraTotal.toFixed(2)}` },
            { classe: "despesa", titulo: "📉 DESP. VARIÁVEIS", valor: `R$ ${totais.despesasVariaveisTotal.toFixed(2)}` },
            { classe: "cartao", titulo: "🏷️ DESP. FIXAS", valor: `R$ ${totais.despesasFixasTotal.toFixed(2)}` },
            { classe: "saldo", titulo: "💳 FATURA CARTÃO", valor: `R$ ${totais.faturaCartaoTotal.toFixed(2)}` },
            { classe: "saldo", titulo: "⚖️ SALDO LÍQUIDO", valor: `R$ ${totais.saldoLiquido.toFixed(2)}` }
        ];
        
        document.getElementById("cardsContainer").innerHTML = cards.map(c => `
            <div class="card-metric ${c.classe}">
                <div class="card-header"><h3>${c.titulo}</h3></div>
                <div class="valor-metric">${c.valor}</div>
            </div>
        `).join("");
        
        document.getElementById("saldoDisponivel").innerHTML = `R$ ${totais.saldoLiquido.toFixed(2)}`;
        document.getElementById("totalFixasMes").innerHTML = `R$ ${totais.despesasFixasTotal.toFixed(2)}`;
        document.getElementById("faturaAtual").innerHTML = `R$ ${totais.faturaCartaoTotal.toFixed(2)}`;
    }

    function renderizarDespesasFixas() {
        const container = document.getElementById("listaDespesasFixas");
        if(despesasFixas.length === 0) {
            container.innerHTML = "<p style='text-align:center; padding:20px;'>Nenhuma despesa fixa</p>";
            return;
        }
        
        container.innerHTML = despesasFixas.map(d => `
            <div class="despesa-fixa-item ${d.paga ? 'pago' : 'nao-pago'}">
                <div class="despesa-info">
                    <div class="despesa-nome">${d.nome}</div>
                    <div class="despesa-valor">R$ ${d.valor.toFixed(2)}</div>
                </div>
                <div class="despesa-categoria">${d.categoria}</div>
                <div class="despesa-acoes">
                    <button class="btn-pagar" onclick="togglePagarDespesa(${d.id})">${d.paga ? '✅ Paga' : '❌ Pagar'}</button>
                    <button class="btn-editar-fixa" onclick="editarDespesaFixa(${d.id})">✏️</button>
                    <button class="btn-excluir-fixa" onclick="excluirDespesaFixa(${d.id})">🗑️</button>
                </div>
            </div>
        `).join("");
    }

    function atualizarParcelasCartao() {
        const novasTransacoes = [];
        comprasCartao.forEach(compra => {
            for(let i = 0; i < compra.parcelas; i++) {
                const dataParcela = new Date(compra.dataCompra);
                dataParcela.setMonth(dataParcela.getMonth() + i);
                novasTransacoes.push({
                    id: compra.id * 1000 + i,
                    compraId: compra.id,
                    descricao: `${compra.descricao} (${i+1}/${compra.parcelas}x)`,
                    valor: compra.valorParcela,
                    tipo: "cartao",
                    categoria: compra.categoria,
                    data: dataParcela.toISOString().slice(0,10)
                });
            }
        });
        
        transacoesAvulsas = transacoesAvulsas.filter(t => t.tipo !== "cartao");
        transacoesAvulsas.push(...novasTransacoes);
        saveData();
    }

    function renderizarExtrato() {
        const tbody = document.getElementById("extratoBody");
        let todas = [...transacoesAvulsas];
        
        despesasFixas.forEach(d => {
            todas.push({
                id: d.id * 100,
                descricao: `${d.nome} (Fixa)`,
                valor: d.valor,
                tipo: "despesa-fixa",
                data: `${anoAtual}-${String(mesAtual+1).padStart(2,'0')}-01`,
                paga: d.paga
            });
        });
        
        todas.sort((a,b) => (a.data < b.data ? 1 : -1));
        
        const busca = document.getElementById("buscaExtrato")?.value.toLowerCase() || "";
        let filtradas = busca ? todas.filter(t => t.descricao.toLowerCase().includes(busca)) : todas;
        
        if(filtradas.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:30px;">📭 Nenhuma transação</td></tr>';
            return;
        }
        
        tbody.innerHTML = filtradas.slice(0, 50).map(t => {
            let sinal = (t.tipo === "renda-extra") ? "+" : "-";
            let cor = (t.tipo === "renda-extra") ? "#0f6e62" : "#c23b22";
            return `
                <tr>
                    <td style="font-size:0.7rem">${t.data.split("-").reverse().join("/")}</td>
                    <td><strong>${t.descricao.substring(0, 25)}</strong></td>
                    <td style="color:${cor}; font-weight:700">${sinal} R$ ${t.valor.toFixed(2)}</td>
                    <td><button class="btn-delete" onclick="excluirItem(${t.id}, '${t.tipo || 'despesa-fixa'}')">🗑️</button></td>
                </tr>
            `;
        }).join("");
    }

    // Funções Globais
    window.togglePagarDespesa = function(id) {
        const despesa = despesasFixas.find(d => d.id === id);
        if(despesa) {
            despesa.paga = !despesa.paga;
            saveData();
            renderizarDespesasFixas();
            renderizarExtrato();
            renderizarCards();
        }
    };

    window.editarDespesaFixa = function(id) {
        const despesa = despesasFixas.find(d => d.id === id);
        const novoNome = prompt("Novo nome:", despesa.nome);
        const novoValor = parseFloat(prompt("Novo valor:", despesa.valor));
        if(novoNome && novoNome.trim()) despesa.nome = novoNome.trim();
        if(!isNaN(novoValor) && novoValor > 0) despesa.valor = novoValor;
        saveData();
        renderizarDespesasFixas();
        renderizarExtrato();
        renderizarCards();
    };

    window.excluirDespesaFixa = function(id) {
        if(confirm("Excluir esta despesa?")) {
            despesasFixas = despesasFixas.filter(d => d.id !== id);
            saveData();
            renderizarDespesasFixas();
            renderizarExtrato();
            renderizarCards();
        }
    };

    window.excluirItem = function(id, tipo) {
        if(confirm("Excluir?")) {
            if(tipo === "despesa-fixa") {
                despesasFixas = despesasFixas.filter(d => d.id !== id/100);
            } else {
                transacoesAvulsas = transacoesAvulsas.filter(t => t.id !== id);
            }
            saveData();
            renderizarDespesasFixas();
            renderizarExtrato();
            renderizarCards();
        }
    };

    function adicionarDespesaFixa() {
        const nome = document.getElementById("nomeDespesaFixa").value.trim();
        const valor = parseFloat(document.getElementById("valorDespesaFixa").value);
        const categoria = document.getElementById("categoriaDespesaFixa").value;
        if(!nome) { alert("Digite o nome!"); return; }
        if(isNaN(valor) || valor <= 0) { alert("Valor inválido!"); return; }
        despesasFixas.push({
            id: Date.now(),
            nome: nome,
            valor: valor,
            categoria: categoria,
            paga: false,
            mesReferencia: mesAtual,
            anoReferencia: anoAtual
        });
        saveData();
        document.getElementById("nomeDespesaFixa").value = "";
        document.getElementById("valorDespesaFixa").value = "";
        renderizarDespesasFixas();
        renderizarExtrato();
        renderizarCards();
    }

    function adicionarVariavel() {
        const desc = document.getElementById("descVariavel").value.trim();
        const valor = parseFloat(document.getElementById("valorVariavel").value);
        const tipo = document.getElementById("tipoVariavel").value;
        const categoria = document.getElementById("categoriaVariavel").value;
        let data = document.getElementById("dataVariavel").value;
        if(!desc) { alert("Descrição!"); return; }
        if(isNaN(valor) || valor <= 0) { alert("Valor inválido!"); return; }
        if(!data) data = new Date().toISOString().slice(0,10);
        transacoesAvulsas.push({ id: Date.now(), descricao: desc, valor: valor, tipo: tipo, categoria: categoria, data: data });
        saveData();
        document.getElementById("descVariavel").value = "";
        document.getElementById("valorVariavel").value = "";
        renderizarExtrato();
        renderizarCards();
    }

    function adicionarCartao() {
        const desc = document.getElementById("descCartao").value.trim();
        const valorTotal = parseFloat(document.getElementById("valorCartao").value);
        const parcelas = parseInt(document.getElementById("parcelasCartao").value);
        const categoria = document.getElementById("categoriaCartao").value;
        let dataCompra = document.getElementById("dataCartao").value;
        if(!desc) { alert("Descrição!"); return; }
        if(isNaN(valorTotal) || valorTotal <= 0) { alert("Valor inválido!"); return; }
        if(!dataCompra) dataCompra = new Date().toISOString().slice(0,10);
        comprasCartao.push({ id: Date.now(), descricao: desc, valorTotal: valorTotal, parcelas: parcelas, valorParcela: valorTotal / parcelas, categoria: categoria, dataCompra: dataCompra });
        atualizarParcelasCartao();
        saveData();
        document.getElementById("descCartao").value = "";
        document.getElementById("valorCartao").value = "";
        renderizarExtrato();
        renderizarCards();
    }

    function salvarRendaFixa() {
        const valor = parseFloat(document.getElementById("rendaFixaInput").value);
        if(!isNaN(valor) && valor >= 0) rendaFixa = valor;
        saveData();
        renderizarCards();
    }

    function salvarLimite() {
        const valor = parseFloat(document.getElementById("limiteCartao").value);
        if(!isNaN(valor) && valor >= 0) limiteCartao = valor;
        saveData();
    }

    function resetarDemo() {
        if(confirm("Resetar todos os dados?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function setupTabs() {
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
                btn.classList.add("active");
                document.getElementById(`tab-${btn.dataset.tab}`).classList.add("active");
            };
        });
    }

    document.getElementById("btnAddDespesaFixa").onclick = adicionarDespesaFixa;
    document.getElementById("btnAddVariavel").onclick = adicionarVariavel;
    document.getElementById("btnAddCartao").onclick = adicionarCartao;
    document.getElementById("btnSalvarRendaFixa").onclick = salvarRendaFixa;
    document.getElementById("btnSalvarLimite").onclick = salvarLimite;
    document.getElementById("btnResetar").onclick = resetarDemo;
    document.getElementById("buscaExtrato").oninput = () => renderizarExtrato();
    
    setupTabs();
    loadData();
</script>
</body>
</html>
